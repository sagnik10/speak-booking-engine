<!DOCTYPE html>
<html>
<head>
    <title>Login 🔐</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #d6ecf3, #eaf4f8);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 10px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
        }
        body {
    color: #222;
}

.card {
    color: #222;
}
    </style>
</head>

<body>


    <div class="card">
    <h2>Login 🔐</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    

    <a href="{% url 'user_register' %}">Create Account 👤</a>
</div>

</body>
</html>
