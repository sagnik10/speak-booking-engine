<!DOCTYPE html>
<html>
<head>
    <title>Counselor Login 🧑‍⚕️</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #ffe0b2, #fff3e0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #fb8c00;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🧑‍⚕️ Counselor Login</h2>
{% if messages %}
    {% for message in messages %}
        <div style="
            background: #ffdddd;
            color: #900;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        ">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
