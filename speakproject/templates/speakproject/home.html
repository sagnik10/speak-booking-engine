<!DOCTYPE html>
<html>
<head>
    <title>Speak 💬</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #89CFF0, #E0F7FA);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 420px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            margin: 8px 0;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            color: white;
        }

        .login-user { background: #1e88e5; }
        .register-user { background: #43a047; }
        .login-counselor { background: #fb8c00; }
        .register-counselor { background: #8e24aa; }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Speak 💬</h1>
    <p>Your safe space to talk, heal & grow 🌱</p>

    <a href="{% url 'user_login' %}" class="btn login-user">
        👤 User Login
    </a>

    <a href="{% url 'user_register' %}" class="btn register-user">
        📝 User Register
    </a>

    <a href="{% url 'employee_login' %}" class="btn login-counselor">
        🧑‍⚕️ Counselor Login
    </a>

    <a href="{% url 'employee_register' %}" class="btn register-counselor">
        🏥 Counselor Register
    </a>
</div>

</body>
</html>
