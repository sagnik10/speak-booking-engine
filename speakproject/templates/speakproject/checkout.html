<!DOCTYPE html>
<html>
<head>
    <title>Secure Payment</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .info {
            text-align: left;
            margin: 15px 0;
            font-size: 14px;
        }

        .info span {
            font-weight: bold;
        }

        .amount {
            font-size: 28px;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .secure {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="title">Confirm Your Payment</div>

    <div class="info">
        <p><span>User:</span> {{ booking.user.username }}</p>
        <p><span>Counselor:</span> {{ booking.counselor.username }}</p>
        <p><span>Session Time:</span> {{ booking.slot.start_time|date:"d M Y, h:i A" }}</p>
    </div>

    <div class="amount">₹{{ booking.amount }}</div>

    <button id="pay-btn" class="btn">Pay Securely</button>

    <div class="secure">🔒 Secured by Razorpay</div>

</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
    var options = {
        "key": "{{ razorpay_key }}",
        "amount": "{{ order.amount }}",
        "currency": "INR",
        "name": "Speak Platform",
        "description": "Session Booking",
        "order_id": "{{ order.id }}",

        "handler": function (response) {
            alert("Payment Successful!");
            console.log("Razorpay Response:", response);

            // ✅ ONLY redirect AFTER real success
            window.location.href = "/payment-success/{{ booking.id }}/";
        },

        "modal": {
            "ondismiss": function(){
                console.log("Payment popup closed");
            }
        },

        "theme": {
            "color": "#667eea"
        }
    };

    var rzp = new Razorpay(options);

    document.getElementById('pay-btn').onclick = function(e){
        rzp.open();
        e.preventDefault();
    }
</script>

</body>
</html>
