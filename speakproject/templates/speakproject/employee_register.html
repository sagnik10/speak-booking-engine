<!DOCTYPE html>
<html>
<head>
    <title>Counselor Register 🧑‍⚕️</title>

    <style>
        
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CARD */
.card {
    background: white;
    padding: 35px;
    border-radius: 18px;
    width: 420px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUT + TEXTAREA */
input, textarea, select {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: 0.2s;
}

/* FOCUS */
input:focus, textarea:focus, select:focus {
    border-color: #667eea;
    outline: none;
}

/* TEXTAREA */
textarea {
    resize: none;
    height: 80px;
}

/* FILE INPUT */
input[type="file"] {
    background: #f9fafb;
    padding: 8px;
}

/* LABEL */
label {
    font-size: 13px;
    margin-top: 12px;
    display: block;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

/* MESSAGES */
.messages p {
    background: #ffebee;
    color: #c62828;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
}

    </style>
</head>

<body>

<div class="card">
    <h2>🧑‍⚕️ Counselor Register</h2>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <!-- ✅ GENDER -->
        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="O">Other</option>
        </select>

        <!-- 🌍 COUNTRY -->
        <label>🌍 Country</label>
        <select name="country" required>
            <option value="" disabled selected>Select Country</option>
            <option value="IN">🇮🇳 India</option>
            <option value="NG">🇳🇬 Nigeria</option>
        </select>

        <input type="text" name="bank_name" placeholder="Bank Name" required>
        <input type="text" name="account_number" placeholder="Account Number" required>
        <input type="text" name="account_holder_name" placeholder="Account Holder Name" required>
        <input type="text" name="ifsc_code" placeholder="IFSC Code">
        <input type="text" name="upi_id" placeholder="UPI ID">

        <label>🧠 Description</label>
        <textarea name="description" rows="3" placeholder="Tell about your expertise..."></textarea>

        <label>📷 Upload Profile Picture</label>
        <input type="file" name="profile_picture" accept="image/*" required>

        <label>🪪 Upload Govt ID</label>
        <input type="file" name="govt_id" accept="image/*,application/pdf" required>

        <label>🎓 Upload Certificates</label>
        <input type="file" name="certificate" accept="image/*,application/pdf" required>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
