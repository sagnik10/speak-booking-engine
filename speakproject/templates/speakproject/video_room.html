<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPEAK | Live Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: #e5e7eb;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 14px 20px;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.3px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
    }

    .timer {
      margin-top: 6px;
      font-size: 13px;
      opacity: 0.9;
    }

    #video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 1100px;
      padding: 20px;
      box-sizing: border-box;
    }

    .video-box {
      position: relative;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
    }

    .label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
    }

    .controls {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(15, 23, 42, 0.85);
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      background: #1e293b;
      color: #e5e7eb;
    }

    .btn-danger { background: #b91c1c; }
    .btn-secondary { background: #334155; }

    .status {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <header>
    SPEAK • Live Session
    <div class="timer" id="timer">Time left: 10:00</div>
  </header>

  <div id="video-grid">
    <div class="video-box" id="local-player">
      <div class="label">You</div>
    </div>
  </div>

  <div class="status" id="status">Waiting for the other person to join…</div>

  <div class="controls">
    <button class="btn btn-secondary" id="muteAudio">Mute</button>
    <button class="btn btn-secondary" id="muteVideo">Video Off</button>
    <button class="btn btn-danger" id="leaveBtn">Leave</button>
  </div>

  <script>
    const APP_ID = "{{ appId }}";
    const TOKEN = "{{ token }}";
    const CHANNEL = "{{ channelName }}";

    const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

    let localTracks = [];
    let remoteUsers = {};
    let timeLeft = 10 * 60; // 10 minutes

    function updateTimer() {
      const min = String(Math.floor(timeLeft / 60)).padStart(2, "0");
      const sec = String(timeLeft % 60).padStart(2, "0");
      document.getElementById("timer").innerText = `Time left: ${min}:${sec}`;

      if (timeLeft <= 0) {
        alert("Session ended.");
        leaveSession();
        return;
      }
      timeLeft--;
    }

    setInterval(updateTimer, 1000);

    async function joinAndPublish() {
      await client.join(APP_ID, CHANNEL, TOKEN, null);
      localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();
      localTracks[1].play("local-player");
      await client.publish(localTracks);
    }

    client.on("user-published", async (user, mediaType) => {
      await client.subscribe(user, mediaType);
      document.getElementById("status").innerText = "Connected";

      if (mediaType === "video") {
        const player = document.createElement("div");
        player.id = `remote-${user.uid}`;
        player.className = "video-box";
        player.innerHTML = `<div class="label">Remote</div>`;
        document.getElementById("video-grid").appendChild(player);
        user.videoTrack.play(player.id);
      }

      if (mediaType === "audio") {
        user.audioTrack.play();
      }
    });

    client.on("user-unpublished", (user) => {
      const el = document.getElementById(`remote-${user.uid}`);
      if (el) el.remove();
      document.getElementById("status").innerText = "Other user left";
    });

    async function leaveSession() {
      for (let track of localTracks) {
        track.stop();
        track.close();
      }
      await client.leave();
      window.location.href = "/dashboard/";
    }

    document.getElementById("leaveBtn").onclick = leaveSession;

    document.getElementById("muteAudio").onclick = async function () {
      const audioTrack = localTracks[0];
      if (!audioTrack) return;
      const muted = audioTrack.isMuted;
      await audioTrack.setMuted(!muted);
      this.innerText = muted ? "Mute" : "Unmute";
    };

    document.getElementById("muteVideo").onclick = async function () {
      const videoTrack = localTracks[1];
      if (!videoTrack) return;
      const muted = videoTrack.isMuted;
      await videoTrack.setMuted(!muted);
      this.innerText = muted ? "Video Off" : "Video On";
    };

    joinAndPublish();
  </script>

</body>
</html>
