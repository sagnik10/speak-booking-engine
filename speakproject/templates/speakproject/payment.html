<!DOCTYPE html>
<html>
<head>
    <title>Secure Payment</title>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        .info {
            text-align: left;
            margin-bottom: 20px;
        }

        .info p {
            margin: 8px 0;
            font-size: 14px;
        }

        .amount {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin: 15px 0;
        }

        .pay-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .pay-btn:hover {
            background: #5a67d8;
        }

        .secure {
            margin-top: 10px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>💳 Secure Payment</h2>

    <div class="info">
        <p><strong>Booking ID:</strong> {{ booking.id }}</p>
        <p><strong>Counselor:</strong> {{ booking.counselor.username }}</p>
        <p><strong>Date:</strong> {{ booking.slot.start_time|date:"d M Y, h:i A" }}</p>
    </div>

    <div class="amount">
    {% if request.user.profile.country == "NG" %}
        ₦{{ booking.amount }}
    {% else %}
        ₹{{ booking.amount }}
    {% endif %}
</div>

    <button id="pay-btn" class="pay-btn">Pay Now</button>

    <div class="secure">
        🔒 100% Secure Payment via Razorpay
    </div>
</div>

<script>
    var options = {
    "key": "{{ razorpay_key }}",
    "amount": Number("{{ amount|default:'0' }}"),
    "order_id": "{{ order_id }}",
    "currency": "{{ booking.currency }}",
    "name": "SpeakCare",
    "description": "Session Booking",

    "handler": function (response) {
        window.location.href = `/payment-success/{{ booking.id }}/?razorpay_payment_id=${response.razorpay_payment_id}&razorpay_order_id=${response.razorpay_order_id}&razorpay_signature=${response.razorpay_signature}`;
    },

    "theme": {
        "color": "#667eea"
    }
};

    var rzp = new Razorpay(options);

    document.getElementById('pay-btn').onclick = function(e){
        rzp.open();
        e.preventDefault();
    }
</script>

</body>
</html>
