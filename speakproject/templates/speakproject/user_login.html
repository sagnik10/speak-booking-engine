<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #eaf4f8, #d6ecf3);
            font-family: Arial, sans-serif;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1565c0;
        }

        .message {
            color: red;
            margin-bottom: 10px;
        }

        .link {
            display: block;
            margin-top: 15px;
            font-size: 14px;
        }
        .register-text a {
    text-decoration: none;
}

.register-text a:hover {
    text-decoration: underline; /* optional hover effect */
}
    </style>
</head>

<body>

<div class="card">
    <h2>User Login</h2>

    <!-- ERROR MESSAGE -->
    {% if error %}
        <div class="message">{{ error }}</div>
    {% endif %}

    <!-- LOGIN FORM -->
    <form method="POST" action="/login/">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p class="register-text">
    Don't have an account? <a href="{% url 'register' %}">Register</a>
</p>
</div>

</body>
</html>
