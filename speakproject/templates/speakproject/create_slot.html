<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Slot</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        .back {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }

        .back:hover {
            text-decoration: underline;
        }

        .message {
            margin-bottom: 10px;
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🗓️ Create Session Slot</h2>

    <!-- 🔥 MESSAGES -->
    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <!-- START TIME -->
        <input type="datetime-local" name="start_time" required>

        <!-- DURATION -->
        <select name="duration" required>
            <option value="">Select Duration</option>
            <option value="10">10 minutes</option>
            <option value="20">20 minutes</option>
            <option value="30">30 minutes</option>
            <option value="60">1 hour</option>
        </select>

        <button type="submit">🚀 Create Slot</button>
    </form>

    <!-- ✅ FIXED URL -->
    <a href="{% url 'counselor_dashboard' %}" class="back">
        ← Back to Dashboard
    </a>
</div>

</body>
</html>
